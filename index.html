<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>IBP Leave Monitor</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="module" id="firebase-init">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    const firebaseConfig = {
      apiKey: "AIzaSyBK4Vvtn_P3nqcxkui9ySbJThr807xxb4I",
      authDomain: "ibp-leave-monitor.firebaseapp.com",
      projectId: "ibp-leave-monitor",
      storageBucket: "ibp-leave-monitor.firebasestorage.app",
      messagingSenderId: "230380682658",
      appId: "1:230380682658:web:5f8f72bfd6c419070c86fb"
    };
    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);
    window.__firebase = { db, doc, setDoc, onSnapshot };
  </script>

  <style>
    :root {
      --bg:        #080E14;
      --bg2:       #0D1520;
      --bg3:       #111D2B;
      --border:    rgba(255,255,255,0.06);
      --border2:   rgba(255,255,255,0.1);
      --text:      #E8F4F0;
      --muted:     #4A6278;
      --muted2:    #1E2F3E;
      --teal:      #00D4B4;
      --teal-dim:  rgba(0,212,180,0.1);
      --amber:     #F5A623;
      --amber-dim: rgba(245,166,35,0.1);
      --red:       #FF4D5E;
      --red-dim:   rgba(255,77,94,0.1);
      --blue:      #3D8EF0;
      --blue-dim:  rgba(61,142,240,0.1);
      --orange:    #FF7A35;
      --orange-dim:rgba(255,122,53,0.1);
      --font-mono: 'DM Mono', monospace;
      --font-ui:   'Sora', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-ui); min-height: 100vh; overflow-x: hidden; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--muted2); border-radius: 2px; }

    @keyframes fadeUp  { from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)} }
    @keyframes fadeIn  { from{opacity:0}to{opacity:1} }
    @keyframes pulse   { 0%,100%{opacity:1}50%{opacity:.3} }

    .fade-up  { animation: fadeUp .3s ease forwards; }
    .fade-in  { animation: fadeIn .2s ease forwards; }

    .dot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}
    .dot.live{background:var(--teal);animation:pulse 2.5s ease infinite}
    .dot.saving{background:var(--amber);animation:pulse .6s ease infinite}
    .dot.offline,.dot.unconfigured{background:var(--red)}
    .dot.connecting{background:var(--muted);animation:pulse 1s ease infinite}

    .glass{background:linear-gradient(135deg,rgba(255,255,255,0.035) 0%,rgba(255,255,255,0.01) 100%);border:1px solid var(--border);backdrop-filter:blur(10px)}

    .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;border:none;font-family:var(--font-ui);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s ease;letter-spacing:.01em}
    .btn:active{transform:scale(.97)}
    .btn-teal{background:var(--teal);color:#000}
    .btn-teal:hover{background:#00f0cc}
    .btn-ghost{background:rgba(255,255,255,0.05);color:var(--muted);border:1px solid var(--border)}
    .btn-ghost:hover{background:rgba(255,255,255,0.08);color:var(--text)}
    .btn-red{background:var(--red-dim);color:var(--red);border:1px solid rgba(255,77,94,.2)}
    .btn-red:hover{background:var(--red);color:#fff}
    .btn-sm{padding:5px 10px;font-size:11px}
    .btn-icon{padding:6px;border-radius:7px;background:rgba(255,255,255,0.03);border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;justify-content:center;font-size:13px}
    .btn-icon:hover{background:rgba(255,255,255,0.07);color:var(--text)}

    .input{width:100%;padding:9px 12px;border-radius:8px;background:rgba(255,255,255,0.04);border:1px solid var(--border2);color:var(--text);font-family:var(--font-ui);font-size:13px;outline:none;transition:border-color .15s}
    .input:focus{border-color:var(--teal)}
    .input::placeholder{color:var(--muted)}
    select.input option{background:var(--bg2)}

    .tag{display:inline-flex;align-items:center;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.04em}

    .nav-btn{width:100%;display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;border:none;cursor:pointer;text-align:left;background:transparent;color:var(--muted);transition:all .15s;font-family:var(--font-ui);outline:none}
    .nav-btn:hover{background:rgba(255,255,255,0.04);color:var(--text)}
    .nav-btn.active{background:rgba(0,212,180,0.1);color:var(--teal)}

    .stagger>*{opacity:0;animation:fadeUp .35s ease forwards}
    .stagger>*:nth-child(1){animation-delay:.05s}
    .stagger>*:nth-child(2){animation-delay:.1s}
    .stagger>*:nth-child(3){animation-delay:.15s}
    .stagger>*:nth-child(4){animation-delay:.2s}
    .stagger>*:nth-child(5){animation-delay:.25s}
    .stagger>*:nth-child(6){animation-delay:.3s}
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useMemo, useEffect, useCallback, useRef } = React;

const DEFAULT_TEAM = [
  { id:1,  name:"Bu Tamie",      leaves:[{id:1,start:"2026-03-27",end:"2026-03-31",type:"cuti"}] },
  { id:2,  name:"Pak Ardi",      leaves:[{id:1,start:"2026-03-30",end:"2026-05-13",type:"cubes",note:"Masuk 18 Mei"}] },
  { id:3,  name:"Pak Ian",       leaves:[{id:1,start:"2026-03-16",end:"2026-04-24",type:"cuti"}] },
  { id:4,  name:"Bu Widhia",     leaves:[{id:1,start:"2026-03-16",end:"2026-03-27",type:"cuti"}] },
  { id:5,  name:"Bima",          leaves:[{id:1,start:"2026-03-11",end:"2026-03-13",type:"cuti"}] },
  { id:6,  name:"Renzo Adriano", leaves:[{id:1,start:"2026-03-04",end:"2026-03-13",type:"cuti"}] },
  { id:7,  name:"Sadad",         leaves:[{id:1,start:"2026-03-16",end:"2026-03-17",type:"cuti"},{id:2,start:"2026-03-25",end:"2026-03-27",type:"cuti"}] },
  { id:8,  name:"Marwan",        leaves:[{id:1,start:"2026-03-09",end:"2026-03-13",type:"cuti"}] },
  { id:9,  name:"Bintang",       leaves:[{id:1,start:"2026-03-27",end:"2026-04-01",type:"cuti"}] },
  { id:10, name:"Shifa",         leaves:[{id:1,start:"2026-03-27",end:"2026-03-31",type:"cuti"}] },
];
const HOLIDAYS = [
  {date:"2026-01-01",name:"Tahun Baru 2026"},{date:"2026-01-16",name:"Isra Mi'raj"},
  {date:"2026-02-16",name:"Imlek 2577"},{date:"2026-02-17",name:"Imlek 2577"},
  {date:"2026-03-18",name:"Hari Suci Nyepi"},{date:"2026-03-19",name:"Nyepi (Cuti Bersama)"},
  {date:"2026-03-20",name:"Cuti Bersama Idul Fitri"},{date:"2026-03-21",name:"Idul Fitri 1447 H"},
  {date:"2026-03-22",name:"Idul Fitri 1447 H"},{date:"2026-03-23",name:"Cuti Bersama Idul Fitri"},
  {date:"2026-03-24",name:"Cuti Bersama Idul Fitri"},{date:"2026-04-03",name:"Wafat Yesus Kristus"},
  {date:"2026-04-05",name:"Kebangkitan Yesus Kristus"},{date:"2026-05-01",name:"Hari Buruh"},
  {date:"2026-05-14",name:"Kenaikan Yesus Kristus"},{date:"2026-05-15",name:"Kenaikan Yesus (CB)"},
  {date:"2026-05-27",name:"Idul Adha 1447 H"},{date:"2026-05-28",name:"Idul Adha (CB)"},
  {date:"2026-05-31",name:"Hari Raya Waisak"},{date:"2026-06-01",name:"Hari Lahir Pancasila"},
  {date:"2026-06-16",name:"Tahun Baru Islam 1448 H"},{date:"2026-08-17",name:"HUT RI ke-81"},
  {date:"2026-08-25",name:"Maulid Nabi Muhammad SAW"},{date:"2026-12-24",name:"Natal (CB)"},
  {date:"2026-12-25",name:"Hari Natal"},
];
const DEFAULT_WFA = ["2026-03-16","2026-03-17","2026-03-25","2026-03-26","2026-03-27"];
const MONTHS_ID = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
const DAYS_ID = ["Min","Sen","Sel","Rab","Kam","Jum","Sab"];

function parseDate(s){const[y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d)}
function fmt(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`}
function fmtShort(d){return d.toLocaleDateString("id-ID",{day:"numeric",month:"short"})}
function fmtFull(d){return d.toLocaleDateString("id-ID",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}
function isWeekend(d){return d.getDay()===0||d.getDay()===6}
function isOnLeave(p,ds){return p.leaves.some(l=>ds>=l.start&&ds<=l.end)}
function getLeaveForDate(p,ds){return p.leaves.find(l=>ds>=l.start&&ds<=l.end)}
function isHoliday(ds){return HOLIDAYS.find(h=>h.date===ds)}
function getDaysInMonth(y,m){return new Date(y,m+1,0).getDate()}
function getMonthDates(y,m){const n=getDaysInMonth(y,m),r=[];for(let i=1;i<=n;i++)r.push(new Date(y,m,i));return r}
function initials(name){return name.split(" ").map(w=>w[0]).slice(0,2).join("").toUpperCase()}
function workdaysBetween(start,end){let c=0,cur=new Date(parseDate(start));const e=parseDate(end);while(cur<=e){if(!isWeekend(cur)&&!isHoliday(fmt(cur)))c++;cur.setDate(cur.getDate()+1)}return c}
const AVATAR_COLORS=[["#00D4B4","#000"],["#F5A623","#000"],["#3D8EF0","#fff"],["#FF4D5E","#fff"],["#A855F7","#fff"],["#10B981","#000"],["#F43F5E","#fff"],["#0EA5E9","#fff"]];
function avatarColor(name){return AVATAR_COLORS[name.charCodeAt(0)%AVATAR_COLORS.length]}

function useFirestoreData(){
  const [data,setData]=useState({team:DEFAULT_TEAM,wfaDates:DEFAULT_WFA});
  const [syncStatus,setSyncStatus]=useState("connecting");
  const saveTimer=useRef(null);
  const localData=useRef(data);
  localData.current=data;
  useEffect(()=>{
    const fb=window.__firebase;if(!fb){setSyncStatus("offline");return;}
    const{db,doc,onSnapshot,setDoc}=fb;
    const ref=doc(db,"ibp-leave-monitor","data");
    try{if(fb.db.app.options.apiKey==="PASTE_YOUR_API_KEY_HERE"){setSyncStatus("unconfigured");return;}}catch{}
    setSyncStatus("connecting");
    const unsub=onSnapshot(ref,snap=>{
      if(snap.exists())setData(snap.data());
      else setDoc(ref,{team:DEFAULT_TEAM,wfaDates:DEFAULT_WFA});
      setSyncStatus("live");
    },err=>{console.error(err);setSyncStatus("offline");});
    return()=>unsub();
  },[]);
  const updateData=useCallback((next)=>{
    const merged={...localData.current,...next};
    setData(merged);setSyncStatus("saving");
    clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(async()=>{
      try{const{db,doc,setDoc}=window.__firebase;await setDoc(doc(db,"ibp-leave-monitor","data"),merged);setSyncStatus("live");}
      catch(e){console.error(e);setSyncStatus("offline");}
    },700);
  },[]);
  return{data,updateData,syncStatus};
}

/* ── APP ── */
function App(){
  const{data,updateData,syncStatus}=useFirestoreData();
  const[page,setPage]=useState("monitor");
  const[selectedMonth,setSelectedMonth]=useState(()=>new Date().getMonth());
  const[modalPerson,setModalPerson]=useState(null);
  const[dayModal,setDayModal]=useState(null);
  const[sidebarOpen,setSidebarOpen]=useState(true);
  const today=new Date(),todayStr=fmt(today);
  const{team,wfaDates}=data;
  const onLeaveToday=team.filter(p=>isOnLeave(p,todayStr));
  const availableToday=team.filter(p=>!isOnLeave(p,todayStr));
  const nextHoliday=HOLIDAYS.find(h=>h.date>=todayStr);
  const nextWFA=wfaDates.filter(d=>d>=todayStr)[0];
  const syncMeta={live:{l:"Live",c:"var(--teal)"},saving:{l:"Menyimpan…",c:"var(--amber)"},offline:{l:"Offline",c:"var(--red)"},connecting:{l:"Connecting…",c:"var(--muted)"},unconfigured:{l:"Setup needed",c:"var(--red)"}}[syncStatus]||{l:"—",c:"var(--muted)"};

  const NAV=[
    {id:"monitor",icon:"⬡",label:"Overview"},
    {id:"timeline",icon:"▦",label:"Timeline"},
    {id:"calendar",icon:"⊞",label:"Kalender"},
    {id:"summary",icon:"◈",label:"Ringkasan"},
    null,
    {id:"cms-leaves",icon:"✈",label:"Data Cuti"},
    {id:"cms-members",icon:"◉",label:"Anggota"},
    {id:"cms-wfa",icon:"⌂",label:"WFA Dates"},
  ];

  return(
    <div style={{display:"flex",minHeight:"100vh"}}>
      {/* noise */}
      <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:0,opacity:.02,backgroundImage:"url(\"data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E\")"}}/>

      {/* SIDEBAR */}
      <aside style={{width:sidebarOpen?216:56,flexShrink:0,background:"linear-gradient(180deg,var(--bg2),var(--bg))",borderRight:"1px solid var(--border)",display:"flex",flexDirection:"column",position:"sticky",top:0,height:"100vh",zIndex:20,transition:"width .25s ease",overflow:"hidden"}}>
        <div style={{padding:"18px 12px 14px",borderBottom:"1px solid var(--border)",flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",gap:9}}>
            <div style={{width:30,height:30,borderRadius:8,background:"linear-gradient(135deg,var(--teal),#0088AA)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,flexShrink:0,fontFamily:"var(--font-mono)",fontWeight:500}}>⬡</div>
            {sidebarOpen&&<div style={{overflow:"hidden"}}>
              <div style={{fontFamily:"var(--font-mono)",fontWeight:500,fontSize:12,color:"var(--text)",whiteSpace:"nowrap"}}>IBP Monitor</div>
              <div style={{fontSize:9,color:"var(--muted)",marginTop:1,whiteSpace:"nowrap"}}>EBIS Partner · ITD</div>
            </div>}
          </div>
        </div>
        {sidebarOpen&&<div style={{padding:"7px 12px",borderBottom:"1px solid var(--border)",flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",gap:6,fontSize:10,color:syncMeta.c,fontFamily:"var(--font-mono)"}}>
            <span className={`dot ${syncStatus}`}/>{syncMeta.l}
          </div>
        </div>}
        <nav style={{padding:"8px 6px",flex:1,overflow:"auto"}}>
          {NAV.map((item,i)=>{
            if(!item)return<div key={`s${i}`} style={{height:1,background:"var(--border)",margin:"6px 0"}}/>;
            const active=page===item.id;
            return(
              <button key={item.id} onClick={()=>setPage(item.id)} title={!sidebarOpen?item.label:""}
                className={`nav-btn${active?" active":""}`}
                style={{fontFamily:"var(--font-ui)"}}>
                <span style={{fontSize:13,flexShrink:0,fontFamily:"var(--font-mono)",width:22,textAlign:"center"}}>{item.icon}</span>
                {sidebarOpen&&<><span style={{fontSize:12,fontWeight:active?600:400,whiteSpace:"nowrap",flex:1}}>{item.label}</span>
                {active&&<span style={{width:4,height:4,borderRadius:2,background:"var(--teal)",flexShrink:0}}/>}</>}
              </button>
            );
          })}
        </nav>
        <div style={{padding:6,borderTop:"1px solid var(--border)",flexShrink:0}}>
          <button className="btn-icon" onClick={()=>setSidebarOpen(v=>!v)} style={{width:"100%",height:30,justifyContent:"center"}}>
            <span style={{fontSize:11,fontFamily:"var(--font-mono)",transform:sidebarOpen?"none":"rotate(180deg)",display:"inline-block",transition:"transform .25s"}}>◀</span>
          </button>
        </div>
      </aside>

      {/* MAIN */}
      <main style={{flex:1,minWidth:0,display:"flex",flexDirection:"column"}}>
        <header style={{padding:"12px 24px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"space-between",background:"rgba(8,14,20,0.85)",backdropFilter:"blur(16px)",position:"sticky",top:0,zIndex:10,flexShrink:0}}>
          <div>
            <h1 style={{fontFamily:"var(--font-mono)",fontSize:14,fontWeight:500,color:"var(--text)"}}>{NAV.find(n=>n&&n.id===page)?.label}</h1>
            <div style={{fontSize:10,color:"var(--muted)",marginTop:1,fontFamily:"var(--font-mono)"}}>{fmtFull(today)}</div>
          </div>
          {["timeline","calendar","summary"].includes(page)&&(
            <div style={{display:"flex",gap:3,background:"rgba(255,255,255,0.03)",borderRadius:8,padding:3,border:"1px solid var(--border)"}}>
              {MONTHS_ID.map((m,i)=>(
                <button key={i} onClick={()=>setSelectedMonth(i)} style={{padding:"3px 8px",borderRadius:5,border:"none",cursor:"pointer",background:selectedMonth===i?"var(--teal)":"transparent",color:selectedMonth===i?"#000":"var(--muted)",fontFamily:"var(--font-ui)",fontSize:10,fontWeight:selectedMonth===i?700:400,transition:"all .1s"}}>
                  {m.slice(0,3)}
                </button>
              ))}
            </div>
          )}
        </header>

        <div style={{flex:1,padding:"22px 24px",overflow:"auto"}}>
          {page==="monitor"   &&<OverviewPage team={team} wfaDates={wfaDates} todayStr={todayStr} today={today} onLeaveToday={onLeaveToday} availableToday={availableToday} nextHoliday={nextHoliday} nextWFA={nextWFA} setModalPerson={setModalPerson}/>}
          {page==="timeline"  &&<TimelinePage team={team} wfaDates={wfaDates} todayStr={todayStr} today={today} selectedMonth={selectedMonth}/>}
          {page==="calendar"  &&<CalendarPage team={team} wfaDates={wfaDates} todayStr={todayStr} today={today} selectedMonth={selectedMonth} setDayModal={setDayModal}/>}
          {page==="summary"   &&<SummaryPage  team={team} wfaDates={wfaDates} todayStr={todayStr} today={today} selectedMonth={selectedMonth}/>}
          {page==="cms-leaves"  &&<CMSLeaves  team={team} updateData={updateData} todayStr={todayStr}/>}
          {page==="cms-members" &&<CMSMembers team={team} updateData={updateData}/>}
          {page==="cms-wfa"     &&<CMSWfa     wfaDates={wfaDates} updateData={updateData} todayStr={todayStr}/>}
        </div>
      </main>

      {modalPerson&&<PersonModal person={team.find(p=>p.name===modalPerson)} todayStr={todayStr} onClose={()=>setModalPerson(null)}/>}
      {dayModal&&<DayModal date={dayModal} team={team} wfaDates={wfaDates} onClose={()=>setDayModal(null)}/>}
    </div>
  );
}

/* ── OVERVIEW ── */
function OverviewPage({team,wfaDates,todayStr,today,onLeaveToday,availableToday,nextHoliday,nextWFA,setModalPerson}){
  const pct=Math.round((availableToday.length/team.length)*100);
  // upcoming in 7 days
  const upcoming=[];
  for(const p of team){for(const l of p.leaves){const diff=Math.round((parseDate(l.start)-new Date())/86400000);if(diff>0&&diff<=7)upcoming.push({p,l,diff});}}
  upcoming.sort((a,b)=>a.l.start.localeCompare(b.l.start));
  return(
    <div className="stagger" style={{display:"flex",flexDirection:"column",gap:16}}>
      {/* KPIs */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:10}}>
        {[
          {label:"Hadir Hari Ini",value:availableToday.length,suffix:`/ ${team.length}`,sub:`${pct}% tim tersedia`,accent:"var(--teal)",bar:pct,icon:"◉"},
          {label:"Sedang Cuti",value:onLeaveToday.length,suffix:"orang",sub:onLeaveToday.map(p=>p.name.split(" ")[0]).join(", ")||"Tidak ada",accent:"var(--orange)",icon:"✈"},
          {label:"Libur Berikutnya",value:nextHoliday?fmtShort(parseDate(nextHoliday.date)):"—",sub:nextHoliday?.name||"Tidak ada",accent:"var(--red)",icon:"⊘"},
          {label:"WFA Berikutnya",value:nextWFA?fmtShort(parseDate(nextWFA)):"—",sub:"Work From Anywhere",accent:"var(--blue)",icon:"⌂"},
        ].map(k=>(
          <div key={k.label} className="glass" style={{borderRadius:13,padding:18,position:"relative",overflow:"hidden"}}>
            {k.bar!==undefined&&<div style={{position:"absolute",bottom:0,left:0,right:0,height:2,background:"var(--border)"}}>
              <div style={{height:"100%",width:`${k.bar}%`,background:k.accent,transition:"width .6s ease"}}/>
            </div>}
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
              <span style={{fontSize:10,color:"var(--muted)",fontFamily:"var(--font-mono)",letterSpacing:".04em"}}>{k.label.toUpperCase()}</span>
              <span style={{fontSize:14,color:k.accent,fontFamily:"var(--font-mono)"}}>{k.icon}</span>
            </div>
            <div style={{display:"flex",alignItems:"baseline",gap:5,marginBottom:4}}>
              <span style={{fontSize:30,fontWeight:800,color:k.accent,fontFamily:"var(--font-mono)",lineHeight:1}}>{k.value}</span>

                      </div>
                    </td>
                    {dates.map(d=>{
                      const ds=fmt(d),hol=isHoliday(ds),we=isWeekend(d),isToday=ds===todayStr,wfa=wfaDates.includes(ds);

            {wfaDates.includes(hovered)&&<span style={{color:"var(--blue)"}}>⌂ WFA</span>}
            {(()=>{const ol=team.filter(p=>isOnLeave(p,hovered));return ol.length>0?<span style={{color:"var(--orange)"}}>✈ {ol.map(p=>p.name).join(", ")}</span>:<span style={{color:"var(--teal)"}}>◉ Semua hadir</span>;})()}

      <div style={{display:"flex",gap:14,flexWrap:"wrap",padding:"2px 2px"}}>

      {modalPerson&&<PersonModal person={team.find(p=>p.name===modalPerson)} todayStr={todayStr} onClose={()=>setModalPerson(null)}/>}
    </div>
  );
}

/* ── SUMMARY ── */
function SummaryPage({team,wfaDates,todayStr,today,selectedMonth}){
  const year=today.getFullYear();
  const monthDates=getMonthDates(year,selectedMonth);
  const workDays=monthDates.filter(d=>!isWeekend(d)&&!isHoliday(fmt(d)));
  const stats=team.map(p=>{
    let ld=0;monthDates.forEach(d=>{const ds=fmt(d);if(!isWeekend(d)&&!isHoliday(ds)&&isOnLeave(p,ds))ld++;});
    const fl=p.leaves.find(l=>{const s=parseDate(l.start),e=parseDate(l.end);return s.getMonth()===selectedMonth||e.getMonth()===selectedMonth;});
    return{...p,leaveDays:ld,firstLeave:fl};
  }).sort((a,b)=>b.leaveDays-a.leaveDays);
  const minAvail=workDays.reduce((mn,d)=>{const n=team.filter(p=>!isOnLeave(p,fmt(d))).length;return n<mn.n?{n,d}:mn},{n:999,d:null});
  const hols=HOLIDAYS.filter(h=>parseDate(h.date).getMonth()===selectedMonth);
  return(
    <div style={{display:"grid",gridTemplateColumns:"1fr 360px",gap:14}}>
      <div className="glass" style={{borderRadius:13,overflow:"hidden"}}>
        <div style={{padding:"14px 18px",borderBottom:"1px solid var(--border)",display:"flex",justifyContent:"space-between"}}>
          <span style={{fontFamily:"var(--font-mono)",fontSize:10,color:"var(--teal)",fontWeight:500,letterSpacing:".05em"}}>RINGKASAN — {MONTHS_ID[selectedMonth].toUpperCase()}</span>
          <span style={{fontFamily:"var(--font-mono)",fontSize:10,color:"var(--muted)"}}>{workDays.length} hari kerja</span>
        </div>
        <div style={{padding:"6px 0"}}>
          {stats.map((s,i)=>{
            const[bg,fg]=avatarColor(s.name);
            return(
              <div key={s.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 18px",borderBottom:i<stats.length-1?"1px solid rgba(255,255,255,0.02)":"none",transition:"background .1s"}}
                onMouseEnter={e=>e.currentTarget.style.background="rgba(255,255,255,0.02)"}
                onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                <div style={{fontSize:10,color:"var(--muted)",fontFamily:"var(--font-mono)",width:14,textAlign:"right",flexShrink:0}}>{i+1}</div>
                <div style={{width:28,height:28,borderRadius:7,background:bg,color:fg,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:9,fontFamily:"var(--font-mono)",flexShrink:0}}>{initials(s.name)}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,fontWeight:600,marginBottom:2}}>{s.name}</div>
                  {s.firstLeave&&<div style={{fontSize:10,color:"var(--muted)"}}>
                    {fmtShort(parseDate(s.firstLeave.start))} — {fmtShort(parseDate(s.firstLeave.end))}
                    {s.firstLeave.note&&<span style={{color:"var(--amber)"}}> · {s.firstLeave.note}</span>}
                  </div>}
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8,minWidth:110}}>
                  <div style={{flex:1,height:3,borderRadius:2,background:"var(--border)"}}>
                    <div style={{height:"100%",width:`${workDays.length>0?(s.leaveDays/workDays.length)*100:0}%`,background:s.leaveDays>10?"var(--red)":s.leaveDays>5?"var(--amber)":"var(--teal)",borderRadius:2,transition:"width .4s"}}/>
                  </div>
                  <span style={{fontSize:11,fontWeight:700,fontFamily:"var(--font-mono)",color:s.leaveDays>10?"var(--red)":s.leaveDays>5?"var(--amber)":"var(--teal)",minWidth:24,textAlign:"right"}}>{s.leaveDays}d</span>
                </div>
              </div>
            );
          })}
        </div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <div className="glass" style={{borderRadius:13,padding:18}}>
          <div style={{fontFamily:"var(--font-mono)",fontSize:10,color:"var(--amber)",fontWeight:500,letterSpacing:".05em",marginBottom:12}}>KAPASITAS MINIMUM</div>
          {minAvail.d?<>
            <div style={{display:"flex",alignItems:"baseline",gap:5,marginBottom:5}}>
              <span style={{fontSize:44,fontWeight:800,fontFamily:"var(--font-mono)",color:minAvail.n<=3?"var(--red)":"var(--amber)",lineHeight:1}}>{minAvail.n}</span>
              <span style={{fontSize:14,color:"var(--muted)"}}>/ {team.length}</span>
            </div>
            <div style={{fontSize:10,color:"var(--muted)"}}>{fmtFull(minAvail.d)}</div>
          </>:<div style={{color:"var(--muted)",fontSize:12}}>Tidak ada data</div>}
        </div>
        <div className="glass" style={{borderRadius:13,padding:18,flex:1}}>
          <div style={{fontFamily:"var(--font-mono)",fontSize:10,color:"var(--red)",fontWeight:500,letterSpacing:".05em",marginBottom:12}}>LIBUR {MONTHS_ID[selectedMonth].toUpperCase()}</div>
          {hols.length===0?<div style={{fontSize:11,color:"var(--muted)",fontStyle:"italic"}}>Tidak ada.</div>
          :<div style={{display:"flex",flexDirection:"column",gap:5}}>
            {hols.map(h=>(
              <div key={h.date} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 9px",borderRadius:7,background:"var(--red-dim)",border:"1px solid rgba(255,77,94,.1)"}}>
                <span style={{fontSize:10}}>{h.name}</span>
                <span style={{fontSize:9,color:"var(--red)",fontFamily:"var(--font-mono)",fontWeight:600,flexShrink:0,marginLeft:6}}>{fmtShort(parseDate(h.date))}</span>
              </div>
            ))}
          </div>}
        </div>
      </div>
    </div>
  );
}

/* ── CMS LEAVES ── */
function CMSLeaves({team,updateData,todayStr}){
  const[editing,setEditing]=useState(null);
  const[confirmDel,setConfirmDel]=useState(null);
  const[toast,setToast]=useState(null);
  const[search,setSearch]=useState("");
  function showToast(m,ok=true){setToast({m,ok});setTimeout(()=>setToast(null),2500);}
  function saveLeave(personId,leave){
    const next=team.map(p=>{if(p.id!==personId)return p;const ex=p.leaves.find(l=>l.id===leave.id);return{...p,leaves:ex?p.leaves.map(l=>l.id===leave.id?leave:l):[...p.leaves,{...leave,id:Date.now()}]};});
    updateData({team:next});setEditing(null);showToast("Cuti disimpan ✓");
  }
  function deleteLeave(pid,lid){updateData({team:team.map(p=>p.id!==pid?p:{...p,leaves:p.leaves.filter(l=>l.id!==lid)})});setConfirmDel(null);showToast("Cuti dihapus");}
  const filtered=team.filter(p=>p.name.toLowerCase().includes(search.toLowerCase()));
  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <Toast toast={toast}/>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        <input className="input" value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍  Cari anggota…" style={{maxWidth:260}}/>
        <span style={{fontSize:10,color:"var(--muted)",fontFamily:"var(--font-mono)"}}>{filtered.length} anggota</span>
      </div>
      {filtered.map(person=>{
        const[bg,fg]=avatarColor(person.name);
        return(
          <div key={person.id} className="glass" style={{borderRadius:13,overflow:"hidden"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 18px",borderBottom:"1px solid var(--border)",background:"rgba(0,0,0,0.15)"}}>
              <div style={{display:"flex",alignItems:"center",gap:9}}>
                <div style={{width:32,height:32,borderRadius:8,background:bg,color:fg,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:10,fontFamily:"var(--font-mono)"}}>{initials(person.name)}</div>
                <div>
                  <div style={{fontWeight:600,fontSize:13}}>{person.name}</div>
                  <div style={{fontSize:10,color:"var(--muted)",marginTop:1}}>{person.leaves.length} entri cuti</div>
                </div>
              </div>
              <button className="btn btn-teal btn-sm" onClick={()=>setEditing({personId:person.id,isNew:true})}>+ Tambah</button>
            </div>
            <div style={{padding:person.leaves.length?10:0}}>
              {person.leaves.length===0?<div style={{padding:"12px 18px",fontSize:10,color:"var(--muted)",fontStyle:"italic"}}>Belum ada cuti.</div>
              :person.leaves.map(l=>{
                const start=parseDate(l.start),end=parseDate(l.end),active=todayStr>=l.start&&todayStr<=l.end;
                return(
                  <div key={l.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 11px",borderRadius:8,marginBottom:5,background:active?"rgba(255,122,53,0.06)":"rgba(255,255,255,0.02)",border:`1px solid ${active?"rgba(255,122,53,.2)":"var(--border)"}`,borderLeft:`3px solid ${l.type==="cubes"?"var(--amber)":"var(--orange)"}`}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:12,fontWeight:600,display:"flex",alignItems:"center",gap:5}}>
                        {fmtShort(start)} — {fmtShort(end)}
                        {active&&<span className="tag" style={{background:"var(--orange-dim)",color:"var(--orange)"}}>AKTIF</span>}
                        <span className="tag" style={{background:l.type==="cubes"?"var(--amber-dim)":"rgba(255,255,255,0.05)",color:l.type==="cubes"?"var(--amber)":"var(--muted)"}}>{l.type==="cubes"?"CUBES":"CUTI"}</span>
                      </div>
                      <div style={{fontSize:9,color:"var(--muted)",marginTop:2,fontFamily:"var(--font-mono)"}}>
                        {workdaysBetween(l.start,l.end)} hari kerja
                        {l.note&&<span style={{color:"var(--amber)"}}> · {l.note}</span>}
                      </div>
                    </div>
                    <button className="btn-icon" onClick={()=>setEditing({personId:person.id,leave:l})}>✏️</button>
                    <button className="btn-icon" style={{color:"var(--red)"}} onClick={()=>setConfirmDel({pid:person.id,lid:l.id,label:`cuti ${fmtShort(start)}–${fmtShort(end)}`})}>🗑️</button>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
      {editing&&<LeaveModal personId={editing.personId} personName={team.find(p=>p.id===editing.personId)?.name} leave={editing.leave} isNew={editing.isNew} onSave={saveLeave} onClose={()=>setEditing(null)}/>}
      {confirmDel&&<ConfirmModal label={confirmDel.label} onConfirm={()=>deleteLeave(confirmDel.pid,confirmDel.lid)} onClose={()=>setConfirmDel(null)}/>}
    </div>
  );
}

/* ── CMS MEMBERS ── */
function CMSMembers({team,updateData}){
  const[editing,setEditing]=useState(null);
  const[confirmDel,setConfirmDel]=useState(null);
  const[toast,setToast]=useState(null);
  function showToast(m,ok=true){setToast({m,ok});setTimeout(()=>setToast(null),2500);}
  function saveMember(member){
    const ex=team.find(p=>p.id===member.id);
    updateData({team:ex?team.map(p=>p.id===member.id?{...p,name:member.name}:p):[...team,{id:Date.now(),name:member.name,leaves:[]}]});
    setEditing(null);showToast("Disimpan ✓");
  }
  function deleteMember(id){updateData({team:team.filter(p=>p.id!==id)});setConfirmDel(null);showToast("Dihapus");}
  return(
    <div>
      <Toast toast={toast}/>
      <div style={{display:"flex",justifyContent:"flex-end",marginBottom:14}}>
        <button className="btn btn-teal" onClick={()=>setEditing({id:null,name:"",isNew:true})}>+ Tambah Anggota</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(195px,1fr))",gap:9}}>
        {team.map(p=>{
          const[bg,fg]=avatarColor(p.name);
          return(
            <div key={p.id} className="glass" style={{borderRadius:11,padding:14,display:"flex",alignItems:"center",gap:9}}>
              <div style={{width:36,height:36,borderRadius:9,background:bg,color:fg,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:11,fontFamily:"var(--font-mono)",flexShrink:0}}>{initials(p.name)}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:12,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</div>
                <div style={{fontSize:9,color:"var(--muted)",marginTop:2}}>{p.leaves.length} cuti terdaftar</div>
              </div>
              <div style={{display:"flex",gap:3}}>
                <button className="btn-icon" onClick={()=>setEditing({id:p.id,name:p.name})}>✏️</button>
                <button className="btn-icon" style={{color:"var(--red)"}} onClick={()=>setConfirmDel({id:p.id,name:p.name})}>🗑️</button>
              </div>
            </div>
          );
        })}
      </div>
      {editing&&<MemberModal member={editing} onSave={saveMember} onClose={()=>setEditing(null)}/>}
      {confirmDel&&<ConfirmModal label={confirmDel.name} onConfirm={()=>deleteMember(confirmDel.id)} onClose={()=>setConfirmDel(null)}/>}
    </div>
  );
}

/* ── CMS WFA ── */
function CMSWfa({wfaDates,updateData,todayStr}){
  const[newDate,setNewDate]=useState("");
  const[toast,setToast]=useState(null);
  function showToast(m,ok=true){setToast({m,ok});setTimeout(()=>setToast(null),2500);}
  function add(){if(!newDate||wfaDates.includes(newDate))return;updateData({wfaDates:[...wfaDates,newDate].sort()});setNewDate("");showToast("WFA date ditambahkan ✓");}
  function remove(d){updateData({wfaDates:wfaDates.filter(x=>x!==d)});showToast("Dihapus");}
  function clearPast(){updateData({wfaDates:wfaDates.filter(d=>d>=todayStr)});showToast("WFA lampau dihapus ✓");}
  const pastDates=wfaDates.filter(d=>d<todayStr);
  const futureDates=wfaDates.filter(d=>d>=todayStr);
  return(
    <div style={{maxWidth:520}}>
      <Toast toast={toast}/>
      <div className="glass" style={{borderRadius:13,padding:20,marginBottom:16}}>
        <div style={{fontFamily:"var(--font-mono)",fontSize:10,color:"var(--blue)",fontWeight:500,letterSpacing:".05em",marginBottom:14}}>TAMBAH WFA DATE</div>
        <div style={{display:"flex",gap:8}}>
          <input className="input" type="date" value={newDate} onChange={e=>setNewDate(e.target.value)} style={{flex:1}}/>
          <button className="btn btn-teal" onClick={add}>Tambah</button>
        </div>
      </div>
      {futureDates.length>0&&<div style={{marginBottom:14}}>
        <div style={{fontFamily:"var(--font-mono)",fontSize:9,color:"var(--muted)",letterSpacing:".06em",marginBottom:7}}>MENDATANG</div>
        <div style={{display:"flex",flexDirection:"column",gap:5}}>
          {futureDates.map(d=>(
            <div key={d} className="glass" style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"11px 14px",borderRadius:9,borderLeft:"3px solid var(--blue)"}}>
              <span style={{fontSize:12,fontWeight:500}}>{fmtFull(parseDate(d))}</span>
              <button className="btn-icon" style={{color:"var(--red)"}} onClick={()=>remove(d)}>🗑️</button>
            </div>
          ))}
        </div>
      </div>}
      {pastDates.length>0&&<div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
          <div style={{fontFamily:"var(--font-mono)",fontSize:9,color:"var(--muted)",letterSpacing:".06em"}}>LAMPAU ({pastDates.length})</div>
          <button className="btn btn-red btn-sm" onClick={clearPast}>Hapus Semua Lampau</button>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:5}}>
          {pastDates.map(d=>(
            <div key={d} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 14px",borderRadius:9,background:"rgba(255,255,255,0.01)",border:"1px solid var(--border)",opacity:.4}}>
              <span style={{fontSize:11,textDecoration:"line-through",color:"var(--muted)"}}>{fmtFull(parseDate(d))}</span>
              <button className="btn-icon" style={{color:"var(--red)"}} onClick={()=>remove(d)}>🗑️</button>
            </div>
          ))}
        </div>
      </div>}
    </div>
  );
}

/* ── MODALS ── */
function Overlay({children,onClose,w=460}){
  return(
    <div className="fade-in" style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.72)",backdropFilter:"blur(12px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200}} onClick={onClose}>
      <div style={{background:"var(--bg2)",borderRadius:14,padding:26,width:`min(${w}px,95vw)`,border:"1px solid var(--border2)",boxShadow:"0 28px 70px rgba(0,0,0,0.6)"}} onClick={e=>e.stopPropagation()}>
        {children}
      </div>
    </div>
  );
}
function PersonModal({person,todayStr,onClose}){
  if(!person)return null;
  const[bg,fg]=avatarColor(person.name);
  const onLeave=isOnLeave(person,todayStr);
  return(
    <Overlay onClose={onClose}>
      <div style={{display:"flex",alignItems:"center",gap:11,marginBottom:18,paddingBottom:14,borderBottom:"1px solid var(--border)"}}>
        <div style={{width:40,height:40,borderRadius:10,background:bg,color:fg,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:13,fontFamily:"var(--font-mono)"}}>{initials(person.name)}</div>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,fontSize:15}}>{person.name}</div>
          <div style={{fontSize:10,color:onLeave?"var(--orange)":"var(--teal)",marginTop:2,display:"flex",alignItems:"center",gap:4}}>
            <span style={{width:5,height:5,borderRadius:50,background:onLeave?"var(--orange)":"var(--teal)",display:"inline-block"}}/>
            {onLeave?"Sedang cuti":"Tersedia hari ini"}
          </div>
        </div>
        <button className="btn-icon" onClick={onClose}>✕</button>
      </div>
      {person.leaves.length===0?<p style={{color:"var(--muted)",fontSize:12,textAlign:"center",padding:"14px 0"}}>Tidak ada jadwal cuti.</p>
      :<div style={{display:"flex",flexDirection:"column",gap:7}}>
        {person.leaves.map(l=>{
          const s=parseDate(l.start),e=parseDate(l.end),active=todayStr>=l.start&&todayStr<=l.end;
          return(
            <div key={l.id} style={{padding:"11px 12px",borderRadius:9,background:"rgba(255,255,255,0.03)",borderLeft:`3px solid ${l.type==="cubes"?"var(--amber)":"var(--orange)"}`,border:`1px solid ${active?"rgba(255,122,53,.2)":"var(--border)"}`}}>
              <div style={{fontSize:12,fontWeight:600,marginBottom:3,display:"flex",gap:5,alignItems:"center"}}>
                {fmtShort(s)} — {fmtShort(e)}
                {active&&<span className="tag" style={{background:"var(--orange-dim)",color:"var(--orange)"}}>AKTIF</span>}
              </div>
              <div style={{color:"var(--muted)",fontSize:10,fontFamily:"var(--font-mono)"}}>
                {workdaysBetween(l.start,l.end)} hari kerja · {l.type==="cubes"?"Cubes":"Cuti Personal"}
                {l.note&&<span style={{color:"var(--amber)"}}> · {l.note}</span>}
              </div>
            </div>
          );
        })}
      </div>}
    </Overlay>
  );
}
function DayModal({date,team,wfaDates,onClose}){
  const hol=isHoliday(date),wfa=wfaDates.includes(date);
  const ol=team.filter(p=>isOnLeave(p,date));
  const avail=team.filter(p=>!isOnLeave(p,date));
  const d=parseDate(date);
  return(
    <Overlay onClose={onClose} w={400}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14,paddingBottom:12,borderBottom:"1px solid var(--border)"}}>
        <div>
          <div style={{fontFamily:"var(--font-mono)",fontSize:26,fontWeight:700,color:"var(--teal)",lineHeight:1}}>{d.getDate()}</div>
          <div style={{fontSize:11,color:"var(--muted)",marginTop:3}}>{fmtFull(d)}</div>
          <div style={{display:"flex",gap:5,marginTop:6,flexWrap:"wrap"}}>
            {hol&&<span className="tag" style={{background:"var(--red-dim)",color:"var(--red)"}}>{hol.name}</span>}
            {wfa&&<span className="tag" style={{background:"var(--blue-dim)",color:"var(--blue)"}}>WFA</span>}
          </div>
        </div>
        <button className="btn-icon" onClick={onClose}>✕</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
        {[{title:"HADIR",color:"var(--teal)",people:avail},{title:"CUTI",color:"var(--orange)",people:ol}].map(({title,color,people})=>(
          <div key={title}>
            <div style={{fontSize:9,color,fontFamily:"var(--font-mono)",fontWeight:500,letterSpacing:".06em",marginBottom:8}}>{title} ({people.length})</div>
            {people.length===0?<div style={{fontSize:10,color:"var(--muted)",fontStyle:"italic"}}>—</div>
            :people.map(p=>{const[bg,fg]=avatarColor(p.name);return(
              <div key={p.id} style={{display:"flex",alignItems:"center",gap:6,padding:"4px 0"}}>
                <div style={{width:20,height:20,borderRadius:4,background:bg,color:fg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:7,fontWeight:700,fontFamily:"var(--font-mono)",flexShrink:0}}>{initials(p.name)}</div>
                <span style={{fontSize:11}}>{p.name}</span>
              </div>
            );})}
          </div>
        ))}
      </div>
    </Overlay>
  );
}
function LeaveModal({personId,personName,leave,isNew,onSave,onClose}){
  const[form,setForm]=useState({id:leave?.id||Date.now(),start:leave?.start||"",end:leave?.end||"",type:leave?.type||"cuti",note:leave?.note||""});
  const[err,setErr]=useState("");
  function save(){if(!form.start||!form.end){setErr("Tanggal harus diisi.");return;}if(form.start>form.end){setErr("Tanggal selesai harus setelah mulai.");return;}onSave(personId,form);}
  const wdays=form.start&&form.end&&form.start<=form.end?workdaysBetween(form.start,form.end):0;
  return(
    <Overlay onClose={onClose}>
      <div style={{fontFamily:"var(--font-mono)",fontSize:16,fontWeight:700,marginBottom:3}}>{isNew?"Tambah Cuti":"Edit Cuti"}</div>
      <div style={{fontSize:11,color:"var(--muted)",marginBottom:18}}>{personName}</div>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <label style={{display:"flex",flexDirection:"column",gap:4,fontSize:10,color:"var(--muted)",fontWeight:500}}>MULAI<input className="input" type="date" value={form.start} onChange={e=>setForm({...form,start:e.target.value})}/></label>
          <label style={{display:"flex",flexDirection:"column",gap:4,fontSize:10,color:"var(--muted)",fontWeight:500}}>SELESAI<input className="input" type="date" value={form.end} onChange={e=>setForm({...form,end:e.target.value})}/></label>
        </div>
        <label style={{display:"flex",flexDirection:"column",gap:4,fontSize:10,color:"var(--muted)",fontWeight:500}}>JENIS
          <select className="input" value={form.type} onChange={e=>setForm({...form,type:e.target.value})}>
            <option value="cuti">Cuti Personal</option>
            <option value="cubes">Cuti Besar (Cubes)</option>
          </select>
        </label>
        <label style={{display:"flex",flexDirection:"column",gap:4,fontSize:10,color:"var(--muted)",fontWeight:500}}>CATATAN
          <input className="input" type="text" value={form.note} onChange={e=>setForm({...form,note:e.target.value})} placeholder="opsional"/>
        </label>
        {wdays>0&&<div style={{fontSize:10,color:"var(--teal)",background:"var(--teal-dim)",padding:"7px 11px",borderRadius:7,fontFamily:"var(--font-mono)"}}>
          ◉ {wdays} hari kerja (tidak termasuk libur & weekend)
        </div>}
        {err&&<div style={{fontSize:10,color:"var(--red)",background:"var(--red-dim)",padding:"7px 11px",borderRadius:7}}>{err}</div>}
      </div>
      <div style={{display:"flex",gap:7,marginTop:18,justifyContent:"flex-end"}}>
        <button className="btn btn-ghost" onClick={onClose}>Batal</button>
        <button className="btn btn-teal" onClick={save}>💾 Simpan</button>
      </div>
    </Overlay>
  );
}
function MemberModal({member,onSave,onClose}){
  const[name,setName]=useState(member.name||"");
  return(
    <Overlay onClose={onClose} w={360}>
      <div style={{fontFamily:"var(--font-mono)",fontSize:16,fontWeight:700,marginBottom:18}}>{member.isNew?"Tambah Anggota":"Edit Nama"}</div>
      <label style={{display:"flex",flexDirection:"column",gap:4,fontSize:10,color:"var(--muted)",fontWeight:500}}>NAMA
        <input className="input" type="text" value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Bu Tamie" autoFocus/>
      </label>
      <div style={{display:"flex",gap:7,marginTop:18,justifyContent:"flex-end"}}>
        <button className="btn btn-ghost" onClick={onClose}>Batal</button>
        <button className="btn btn-teal" onClick={()=>{if(name.trim())onSave({id:member.id,name:name.trim()})}}>💾 Simpan</button>
      </div>
    </Overlay>
  );
}
function ConfirmModal({label,onConfirm,onClose}){
  return(
    <Overlay onClose={onClose} w={340}>
      <div style={{textAlign:"center"}}>
        <div style={{fontSize:40,marginBottom:10}}>⚠️</div>
        <div style={{fontWeight:700,fontSize:15,marginBottom:7}}>Hapus?</div>
        <div style={{color:"var(--muted)",fontSize:11,marginBottom:22,lineHeight:1.7}}>Yakin hapus <strong style={{color:"var(--text)"}}>{label}</strong>?<br/>Tidak bisa dibatalkan.</div>
        <div style={{display:"flex",gap:7,justifyContent:"center"}}>
          <button className="btn btn-ghost" onClick={onClose}>Batal</button>
          <button className="btn btn-red" onClick={onConfirm}>Hapus</button>
        </div>
      </div>
    </Overlay>
  );
}
function Toast({toast}){
  if(!toast)return null;
  return(
    <div className="fade-in" style={{position:"fixed",bottom:22,right:22,zIndex:999,background:toast.ok?"var(--teal)":"var(--red)",color:"#000",padding:"9px 16px",borderRadius:9,fontWeight:700,fontSize:11,boxShadow:"0 8px 28px rgba(0,0,0,0.5)",fontFamily:"var(--font-mono)"}}>
      {toast.m}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
